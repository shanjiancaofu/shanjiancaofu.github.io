<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#52616b"/>
    </marker>
    <style>
      .box { fill: #f7f9fb; stroke: #52616b; stroke-width: 2; rx: 10; }
      .line { fill: none; stroke: #52616b; stroke-width: 2.5; marker-end: url(#arrow); }
      .text { fill: #263238; font: 19px Arial, sans-serif; text-anchor: middle; }
      .title { fill: #263238; font: bold 22px Arial, sans-serif; text-anchor: start; }
      .sign { fill: #263238; font: 20px Arial, sans-serif; text-anchor: middle; }
    </style>
  </defs>
  <text class="title" x="45" y="45">Open-loop control</text>
  <path class="line" d="M70 115 H210"/>
  <rect class="box" x="210" y="75" width="180" height="80"/>
  <text class="text" x="300" y="122">Controller</text>
  <path class="line" d="M390 115 H520"/>
  <rect class="box" x="520" y="75" width="180" height="80"/>
  <text class="text" x="610" y="122">Plant</text>
  <path class="line" d="M700 115 H885"/>

  <text class="title" x="45" y="235">Closed-loop control</text>
  <path class="line" d="M70 305 H145"/>
  <circle cx="175" cy="305" r="30" fill="#fff" stroke="#52616b" stroke-width="2"/>
  <text class="sign" x="175" y="312">sum</text>
  <text class="sign" x="164" y="270">+</text>
  <text class="sign" x="164" y="352">-</text>
  <path class="line" d="M205 305 H300"/>
  <rect class="box" x="300" y="265" width="160" height="80"/>
  <text class="text" x="380" y="312">Controller</text>
  <path class="line" d="M460 305 H555"/>
  <rect class="box" x="555" y="265" width="160" height="80"/>
  <text class="text" x="635" y="312">Plant</text>
  <path class="line" d="M715 305 H885"/>
  <path class="line" d="M820 305 V395 H175 V335"/>
</svg>
